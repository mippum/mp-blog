site_name: 미쁨에듀 블로그
site_description: Mippum's Blog from MD Files
site_author: mippum
site_url: https://mippum.github.io/mp-blog/

theme:
  name: material
  language: ko
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    primary: brown
    accent: amber
  features:
    - navigation.tabs
    - navigation.footer
  icon:
    logo: material/home

nav:
  - 홈: index.md
  - 연재글: blog/index.md
  - 소개 : about.md

plugins:
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      blog_toc: true
      post_url_format: "{categories}/{date}/{slug}/"
      post_excerpt: optional
      post_date_format: full
      categories: true
  - macros:
      module_name: main
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - scripts/extra.js

extra:
  CNAME: blog.mippum.com
